server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Backend dùng network_mode: host → truy cập qua host gateway IP 172.17.0.1
    # (IP này được Docker inject vào /etc/hosts như host.docker.internal)
    set $backend_host "172.17.0.1:8000";

    # ── Proxy WebSocket /ws/* → backend ──────────────────────────
    location /ws/ {
        proxy_pass         http://$backend_host;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 86400s;
    }

    # ── Proxy REST API /events/* → backend ───────────────────────
    location /events/ {
        proxy_pass       http://$backend_host;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Proxy /health → backend ──────────────────────────────────
    location /health {
        proxy_pass       http://$backend_host;
        proxy_set_header Host $host;
    }

    # ── Proxy /faces/* → backend (ảnh khuôn mặt) ─────────────────
    location /faces/ {
        proxy_pass       http://$backend_host;
        proxy_set_header Host $host;
    }

    # ── SPA fallback ─────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
