services:

  # ── Backend: FastAPI Event Hub ────────────────────────────────
  backend:
    build: ./backend
    container_name: app_center_backend
    restart: unless-stopped
    network_mode: host          # dùng host network → kết nối MongoDB tại localhost:28017
    environment:
      - PYTHONUNBUFFERED=1
      - MONGODB_URL=mongodb://localhost:28017
      - MONGODB_DB_NAME=event_hub
      - EVENT_TTL_DAYS=30

  # ── Frontend: React + Vite → build → Nginx ───────────────────
  frontend:
    build:
      context: ./frontend
      args:
        # Để trống → useEventHub.ts dùng window.location.host (same-origin qua nginx proxy)
        VITE_WS_URL: ""
        VITE_API_URL: ""
    container_name: app_center_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"   # 172.17.0.1 → backend host-network
    depends_on:
      - backend
