services:
  webcam_server:
    build: .
    container_name: webcam_server
    restart: unless-stopped
    privileged: true                # cần để rpicam-vid truy cập Pi camera hardware
    network_mode: host              # dùng host network để tránh phức tạp port mapping
    volumes:
      - /usr/bin/rpicam-vid:/usr/bin/rpicam-vid:ro
      - /usr/bin/rpicam-still:/usr/bin/rpicam-still:ro
      - /lib/aarch64-linux-gnu:/lib/aarch64-linux-gnu:ro
      - /usr/lib/aarch64-linux-gnu:/usr/lib/aarch64-linux-gnu:ro
      - /usr/share/libcamera:/usr/share/libcamera:ro
      - /usr/share/libpisp:/usr/share/libpisp:ro
      - /usr/share/rpicam-apps:/usr/share/rpicam-apps:ro
      - /run/udev:/run/udev:ro
    environment:
      - CAMERA_SOURCE=pi
      - JPEG_QUALITY=70
      - TARGET_FPS=20
      - RESIZE_WIDTH=640
      - HOST=0.0.0.0
      - PORT=8090
      - PI_WIDTH=640
      - PI_HEIGHT=480
    # Uncomment nếu dùng file .env thay vì khai báo trực tiếp:
    # env_file:
    #   - .env
